<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cookies Locations - Modern Selector</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0e1116;
      --panel:#161b22;
      --panel2:#1c222d;
      --text:#e6edf3;
      --muted:#9aa7b2;
      --accent:#46d66a;
      --border:#2a313d;
      --danger:#ff5c5c;
    }

    *{
      box-sizing:border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 28px 16px 60px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    /* HEADER */
    .logo h2 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 18px;
      font-weight: 700;
    }

    .disclaimer {
      max-width: 900px;
      background: rgba(255, 92, 92, 0.08);
      border: 1px solid rgba(255, 92, 92, 0.25);
      padding: 16px 18px;
      border-radius: 14px;
      color: #ffd7d7;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 24px;
      backdrop-filter: blur(6px);
    }

    .disclaimer a {
      color: #ff9a9a;
    }

    /* GRID */
    .tiles-container {
      width: min(1200px, 95%);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .tile {
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      text-align: center;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      position: relative;
      overflow: hidden;
    }

    .tile::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(70,214,106,0.12), transparent 60%);
      opacity: 0;
      transition: 0.25s;
    }

    .tile:hover {
      transform: translateY(-6px);
      border-color: var(--accent);
    }

    .tile:hover::after {
      opacity: 1;
    }

    /* MODAL */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 20px;
      backdrop-filter: blur(6px);
    }

    .modal-backdrop.active {
      display: flex;
    }

    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.6);
      width: min(750px, 95vw);
      max-height: 90vh;
      overflow-y: auto;
      padding: 26px;
      position: relative;
    }

    .modal h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .modal p {
      margin: 8px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .modal p strong {
      color: var(--text);
    }

    /* CLOSE BUTTON */
    .close-btn {
      position: absolute;
      top: 14px;
      right: 16px;
      font-size: 24px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
    }

    .close-btn:hover {
      color: white;
    }

    /* MAP */
    .map-container {
      margin-top: 14px;
      height: 320px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .map-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* BUTTON */
    .select-btn {
      margin-top: 18px;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: var(--accent);
      color: #0b0f0c;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .select-btn:hover {
      transform: scale(1.02);
      filter: brightness(1.05);
    }

    /* FOOTER */
    footer {
      margin-top: 40px;
      font-size: 13px;
      color: var(--muted);
    }

    footer img {
      vertical-align: middle;
      margin-left: 6px;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .tile {
        font-size: 14px;
        padding: 18px;
      }

      .modal {
        padding: 20px;
      }
    }

  </style>
</head>

<body>

  <div class="logo">
    <h2>Independent Terpene Viewer for CookiesFlorida.co</h2>
  </div>

  <div class="disclaimer">
    ⚠️ This site is <strong>not affiliated</strong> with the official
    <a href="https://cookies.co" target="_blank">Cookies.co</a>.
    It is an independent filtering tool for browsing locations.
  </div>

  <div class="tiles-container" id="tilesContainer"></div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <button class="close-btn" id="closeBtn">&times;</button>

      <h2 id="modalTitle">City Name</h2>

      <p><strong>Type:</strong> <span id="modalType">-</span></p>
      <p><strong>Address:</strong> <span id="modalAddress">-</span></p>

      <div class="map-container" id="mapContainer"></div>

      <button class="select-btn" id="selectBtn">Select</button>
    </div>
  </div>

  <footer>
    <p>
      Visitors:
      <img src="https://visitor-badge.laobi.icu/badge?page_id=BurlyVik.COACookies">
    </p>
  </footer>
  <script>
    const locations = [
      { city: "Bradenton", type: "Pickup", address: "4427 53rd Ave E, Bradenton, FL 34203" },
      { city: "Brooksville", type: "Pickup", address: "12115 Cortez Blvd, Brooksville, FL 34613" },
      { city: "Deland Woodland", type: "Pickup", address: "2235 S Woodland Blvd, DeLand, FL 32720" },
      { city: "Fort Myers", type: "Pickup", address: "9962 Interstate Commerce Dr, Fort Myers, FL 33913" },
      { city: "Gainesville", type: "Pickup", address: "626 NW 13th St, Gainesville, FL 32601" },
      { city: "Jacksonville", type: "Pickup", address: "8215 Dix Ellis Trail, Jacksonville, FL 32256" },
      { city: "Miami", type: "Pickup", address: "8303 Bird Rd, Miami, FL 33155" },
      { city: "N. Miami Beach", type: "Pickup", address: "17150 Biscayne Blvd, Aventura, FL 33160" },
      { city: "Orange Blossom", type: "Pickup", address: "9350 S Orange Blossom Trl, Orlando, FL 32837" },
      { city: "Orange Park", type: "Pickup", address: "859 Blanding Blvd, Orange Park, FL 32065" },
      { city: "Orlando", type: "Delivery & Pickup", address: "1345 Lee Rd, Orlando, FL 32810" },
      { city: "Palm Bay", type: "Pickup", address: "1300 Palm Bay Rd NE, Palm Bay, FL 32905" },
      { city: "Pensacola", type: "Pickup", address: "176 E 9 Mile Rd, Pensacola, FL 32534" },
      { city: "Port St. Lucie", type: "Pickup", address: "1401 SE Village Green Dr, Port St. Lucie, FL 34952" },
      { city: "Tampa", type: "Pickup", address: "2961 N Dale Mabry Hwy, Tampa, FL 33607" },
      { city: "Tampa Fletcher", type: "Pickup", address: "1509 E Fletcher Ave, Tampa, FL 33612" }
    ];

    const tilesContainer = document.getElementById('tilesContainer');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalTitle = document.getElementById('modalTitle');
    const modalType = document.getElementById('modalType');
    const modalAddress = document.getElementById('modalAddress');
    const mapContainer = document.getElementById('mapContainer');
    const closeBtn = document.getElementById('closeBtn');
    const selectBtn = document.getElementById('selectBtn');

    let selectedLocation = null;

    function slugify(city) {
      return city.toLowerCase().replace(/\./g, '').replace(/\s+/g, '-').replace(/[^a-z0-9\-]/g, '');
    }

    function openModal(index) {
      selectedLocation = locations[index];
      modalTitle.textContent = selectedLocation.city;
      modalType.textContent = selectedLocation.type;
      modalAddress.textContent = selectedLocation.address;

      const encoded = encodeURIComponent(selectedLocation.address);
      const mapURL = `https://www.google.com/maps?q=${encoded}&output=embed`;

      mapContainer.innerHTML = `<iframe src="${mapURL}" allowfullscreen loading="lazy"></iframe>`;
      modalBackdrop.classList.add('active');
    }

    function closeModal() {
      modalBackdrop.classList.remove('active');
      selectedLocation = null;
      mapContainer.innerHTML = '';
    }

    locations.forEach((loc, i) => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.textContent = loc.city;
      tile.addEventListener('click', () => openModal(i));
      tilesContainer.appendChild(tile);
    });

    closeBtn.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', e => {
      if (e.target === modalBackdrop) closeModal();
    });

    selectBtn.addEventListener('click', () => {
      if (selectedLocation) {
        const slug = slugify(selectedLocation.city);
        window.location.href = `cookyTerps.html?retailer=${slug}`;
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
