<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Terpene Viewer — Jungle Boys</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0e1116;
      --panel:#161b22;
      --panel2:#1c222d;
      --text:#e6edf3;
      --muted:#9aa7b2;
      --accent:#46d66a;
      --border:#2a313d;
      --blue:#3b82f6;
    }

    *{
      box-sizing:border-box;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      padding: 14px;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      margin: 10px 0;
      font-weight: 700;
    }

    #status {
      text-align: center;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* PROGRESS BAR */
    #progressBarContainer {
      width: 100%;
      max-width: 520px;
      margin: 12px auto;
      height: 10px;
      border-radius: 999px;
      background: #222834;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue), var(--accent));
      transition: width 0.3s ease;
    }

    /* FILTER */
    #filterContainer {
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-top: 14px;
    }

    #subcategoryFilter {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 0.95rem;
      outline:none;
      cursor:pointer;
    }

    /* TABLE WRAPPER */
    #tableContainer{
      margin-top: 18px;
      overflow-x:auto;
      padding: 0 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      font-size: 0.85rem;
      table-layout: fixed;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      text-align: center;
      word-wrap: break-word;
    }

    th {
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      color: var(--text);
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 1;
      cursor: pointer;
    }

    tr:hover td{
      background: rgba(70,214,106,0.06);
    }

    tr:nth-child(even) td {
      background: rgba(255,255,255,0.02);
    }

    a.product-link {
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
    }

    a.product-link:hover {
      text-decoration: underline;
    }

    /* BIGGER PRODUCT IMAGES */
    img.product-img {
      max-width: 110px;
      max-height: 110px;
      object-fit: contain;
      border-radius: 10px;
      background: #111722;
      padding: 6px;
    }

    /* HIGHLIGHTS (kept but cleaner) */
    td.highlight-row { background-color: rgba(70,214,106,0.15) !important; }
    td.highlight-col { background-color: rgba(123, 92, 255, 0.12) !important; }
    td.highlight-cell { background-color: rgba(255,255,255,0.05) !important; }

    /* INFO ICON */
    .info-icon {
      cursor: pointer;
      opacity: 0.8;
    }

    .info-icon:hover{
      opacity:1;
    }

    /* OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 14px;
      backdrop-filter: blur(6px);
    }

    .overlay-content {
      background: var(--panel);
      padding: 22px;
      border-radius: 16px;
      max-width: 600px;
      max-height: 80%;
      overflow-y: auto;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .error {
      color: #ff6b6b;
      text-align: center;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      table {
        font-size: 0.75rem;
      }

      img.product-img {
        max-width: 70px;
        max-height: 70px;
      }

      h1 {
        font-size: 1.2rem;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1rem;
      }

      #subcategoryFilter {
        font-size: 0.85rem;
      }
    }

    /* ===== PRODUCT PREVIEW TOAST ===== */

.preview-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 20px;
}

.preview-backdrop.active {
  display: flex;
}

.preview-modal {
  width: min(900px, 95vw);
  max-height: 85vh;
  overflow: hidden;
  background: #161b22;
  border: 1px solid #2a313d;
  border-radius: 18px;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  box-shadow: 0 25px 70px rgba(0,0,0,0.6);
}

/* IMAGE SIDE */
.preview-image {
  background: #0f141c;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
}

.preview-image img {
  max-width: 100%;
  max-height: 70vh;
  object-fit: contain;
  border-radius: 12px;
}

/* INFO SIDE */
.preview-info {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow: hidden;
}

.preview-title {
  font-size: 18px;
  font-weight: 700;
}

.preview-price {
  color: #46d66a;
  font-weight: 700;
  font-size: 16px;
}

.preview-link a {
  color: #3b82f6;
  text-decoration: none;
}

.preview-link a:hover {
  text-decoration: underline;
}

/* TERP SECTION */
.terp-scroll {
  margin-top: 10px;
  padding: 10px;
  background: #0f141c;
  border: 1px solid #2a313d;
  border-radius: 12px;
  flex: 1;
  overflow-y: auto;
  font-size: 13px;
  line-height: 1.5;
}

.terp-row {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  border-bottom: 1px dashed rgba(255,255,255,0.06);
}

.terp-row span:first-child {
  color: #9aa7b2;
}

.terp-row span:last-child {
  color: #e6edf3;
}
  </style>
</head>

<body>

  <h1 id="pageTitle">Terpene Data</h1>
  <div id="status">Loading...</div>

  <div id="progressBarContainer">
    <div id="progressBar"></div>
  </div>

  <div id="filterContainer">
    <label style="font-weight:600; color:var(--muted);">Filter</label>
    <select id="subcategoryFilter">
      <option value="all">All Products</option>
      <option value="vape-pens">Vapes</option>
      <option value="concentrates">Concentrates</option>
      <option value="premium-flower">Premium Flower</option>
      <option value="pre-rolls">Pre-rolls</option>
      <option value="pops">Pops</option>
    </select>
  </div>

  <div id="tableContainer"></div>

  <div id="overlay" class="overlay" onclick="if(event.target.id==='overlay'){ this.style.display='none'; }">
    <div id="overlayContent" class="overlay-content"></div>
  </div>

  <div id="previewBackdrop" class="preview-backdrop">
  <div class="preview-modal" id="previewModal">
    
    <div class="preview-image">
      <img id="previewImg" src="" />
    </div>

    <div class="preview-info">
      <div class="preview-title" id="previewTitle">Product</div>

      <div class="preview-price" id="previewPrice">$0.00</div>

      <div class="preview-link" id="previewLink"></div>

      <div class="terp-scroll" id="previewTerps"></div>
    </div>

  </div>
</div>
  
<script>
const progressBar = document.getElementById("progressBar");
function updateProgress(percent) { progressBar.style.width = percent + "%"; }
updateProgress(5);

const params = new URLSearchParams(window.location.search);
const retailer = params.get("retailer") || "jungle-boys-tampa";
const displayName = retailer.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
document.getElementById("pageTitle").textContent = Terpenes — ${displayName};

let allFetchedProducts = [];

Promise.all([
  fetch(https://jungleboysflorida.com/wp-json/dovetail-api/v1/products?perpage=150&retailer=${retailer}&menutype=medical&categories[]=vape-pens).then(r => r.json()),
  fetch(https://jungleboysflorida.com/wp-json/dovetail-api/v1/products?perpage=150&retailer=${retailer}&menutype=medical&categories[]=concentrates).then(r => r.json()),
  fetch(https://jungleboysflorida.com/wp-json/dovetail-api/v1/products?perpage=150&retailer=${retailer}&menutype=medical&subcategory=premium-flower).then(r => r.json()),
  fetch(https://jungleboysflorida.com/wp-json/dovetail-api/v1/products?perpage=150&retailer=${retailer}&menutype=medical&categories[]=pre-rolls).then(r => r.json()),
  fetch(https://jungleboysflorida.com/wp-json/dovetail-api/v1/products?perpage=150&retailer=${retailer}&menutype=medical&subcategory=pops).then(r => r.json())
]).then(([vapeData, concData, flowerData, prerollData, popsData]) => {
  updateProgress(40);

  const vapeProducts = vapeData?.results ?? [];
  const concProducts = concData?.results ?? [];
  const flowerProducts = flowerData?.results ?? [];
  const prerollProducts = prerollData?.results ?? [];
  const popsProducts = popsData?.results ?? [];

  vapeProducts.forEach(p => p._sourceCategory = "vape-pens");
  concProducts.forEach(p => p._sourceCategory = "concentrates");
  flowerProducts.forEach(p => p._sourceCategory = "premium-flower");
  prerollProducts.forEach(p => p._sourceCategory = "pre-rolls");
  popsProducts.forEach(p => p._sourceCategory = "pops");

  allFetchedProducts = [...vapeProducts, ...concProducts, ...flowerProducts, ...prerollProducts, ...popsProducts];

  updateProgress(80);
  renderTerpeneTable(allFetchedProducts);
  updateProgress(100);
}).catch(err => {
  document.getElementById("status").innerHTML = <p class="error">Failed to load data for <strong>${displayName}</strong>.</p>;
  console.error(err);
});

document.getElementById("subcategoryFilter").addEventListener("change", function () {
  const selected = this.value;
  if (selected === "all") {
    renderTerpeneTable(allFetchedProducts);
  } else {
    renderTerpeneTable(allFetchedProducts.filter(p => p._sourceCategory === selected));
  }
});

function renderTerpeneTable(products) {
  const excludedTerpenes = ["Guaiol", "Eucalyptol", "Isopulegol", "Nerolidol", "Terpinene"];
  const allTerpenes = [...new Set(products.flatMap(p => (p.terpenes ?? [])
    .map(t => t.name)
    .filter(name => name && !excludedTerpenes.includes(name))
  ))].sort();

  const columns = ["Image", "Price", "ProductName", "Delivery", ...allTerpenes];
  const retailerParam = new URLSearchParams(window.location.search).get("retailer") || "";

  const rows = products.map(p => {
    const terpMap = Object.fromEntries((p.terpenes ?? []).map(t => [t.name, typeof t.value === "number" ? t.value.toFixed(2) : ""]));

    let priceValue = "—";
    if (Array.isArray(p.variants) && p.variants.length > 0) {
      const variantPrice = p.variants[0].price ?? p.variants[0].regular_price;
      if (variantPrice !== undefined && variantPrice !== null) {
        priceValue = $${parseFloat(variantPrice).toFixed(2)};
      }
    }

    let productLink = p.permalink || p.link || "#";
    if (retailerParam && productLink.includes("jungleboysflorida.com")) {
      const urlObj = new URL(productLink);
      urlObj.searchParams.set("retailer", retailerParam);
      productLink = urlObj.toString();
    }

    return {
      Image: p.images?.[0]?.url || "",
      Price: priceValue,
      ProductName: <a class="product-link" href="${productLink}" target="_blank" rel="noopener noreferrer">${p.name}</a>,
      Delivery: p.subcategory || "",
      ...Object.fromEntries(allTerpenes.map(t => [t, terpMap[t] ?? ""]))
    };
  });

  createSortableTable(columns, rows);
  document.getElementById("status").textContent = Loaded ${rows.length} products.;
}

function createSortableTable(columns, data) {
  const table = document.createElement("table");
  const thead = table.createTHead();
  const headRow = thead.insertRow();

  columns.forEach(col => {
    const th = document.createElement("th");
    th.style.textAlign = "center";
    th.style.whiteSpace = "normal";

    if (terpeneDescriptions[col]) {
      const headerFlex = document.createElement("div");
      headerFlex.style.display = "flex";
      headerFlex.style.justifyContent = "space-between";
      headerFlex.style.alignItems = "center";
      headerFlex.style.width = "100%";

      const colLabel = document.createElement("span");
      colLabel.textContent = col;

      const infoIcon = document.createElement("span");
      infoIcon.className = "info-icon";
      infoIcon.textContent = "ℹ️";
      infoIcon.onclick = (e) => showDescription(e, col);

      headerFlex.appendChild(colLabel);
      headerFlex.appendChild(infoIcon);
      th.appendChild(headerFlex);
    } else {
      th.textContent = col;
    }

    th.addEventListener("click", () => sortBy(col, data));
    headRow.appendChild(th);
  });

  const tbody = table.createTBody();
  data.forEach(row => {
    const tr = tbody.insertRow();
    columns.forEach(col => {
      const td = tr.insertCell();
      if (col === "Image" && row[col]) {
        if (col === "Image" && row[col]) {

  const imgUrl = row[col];

  td.innerHTML = `<img class="product-img" src="${imgUrl}" />`;

  const imgEl = td.querySelector("img");

  // 🔥 FIX: find product by ANY matching image, not Map lookup
  const product = products.find(p =>
    p.images?.some(img => img.url === imgUrl)
  );

  if (product) {
    imgEl.addEventListener("pointerenter", () => {

      const price = product.variants?.length
        ? `$${parseFloat(
            product.variants[0].price ??
            product.variants[0].regular_price ??
            0
          ).toFixed(2)}`
        : "—";

      openPreview({
        image: imgUrl,
        name: product.name,
        price,
        link: product.permalink || product.link,
        terpenes: (product.terpenes || []).map(t => ({
          name: t.name,
          value: t.value
        }))
      });

    });

    imgEl.addEventListener("mouseleave", closePreview);
  }
}

td.querySelector("img").addEventListener("mouseenter", () => {
  const product = data.find(p => p.Image === row[col]) || row;

  openPreview({
    image: row[col],
    name: row.ProductName?.replace(/<[^>]*>/g, ""),
    price: row.Price,
    link: product?.ProductName?.match(/href="([^"]+)"/)?.[1],
    terpenes: Object.keys(row)
      .filter(k => !["Image","Price","ProductName","Delivery"].includes(k))
      .map(k => ({ name: k, value: row[k] }))
  });
});
      } else {
        td.innerHTML = row[col] || "";
      }
    });
  });

  document.getElementById("tableContainer").innerHTML = "";
  document.getElementById("tableContainer").appendChild(table);
}

function sortBy(col, data) {
  const isNumeric = data.every(row => !isNaN(parseFloat(row[col])) || row[col] === "");
  const sorted = [...data].sort((a, b) => {
    const av = isNumeric ? parseFloat(a[col]) || 0 : (a[col] || "").toLowerCase();
    const bv = isNumeric ? parseFloat(b[col]) || 0 : (b[col] || "").toLowerCase();
    return isNumeric ? bv - av : av.localeCompare(bv);
  });
  createSortableTable(Object.keys(sorted[0]), sorted);
}

function showDescription(event, col) {
  event.stopPropagation();
  document.getElementById("overlayContent").innerHTML = terpeneDescriptions[col] || "No description.";
  document.getElementById("overlay").style.display = "flex";
}

  // retrieved emojis from emojieDB

      "Beta Caryophyllene": 🧁 <strong>Beta Caryophyllene</strong><br><br>• Smells like: Peppery, spicy<br>• Feels like: Calm, pain relief<br>• Helps with: Anxiety, inflammation<br>• Cool fact: Binds to cannabinoid receptors,

      "Camphene": 🔥 <strong>Camphene</strong><br><br>• Smells like: Camphor (like Vicks VapoRub)<br>• Feels like: Clean, breathing easier<br>• Helps with: Inflammation, heart health (early studies),

      "Trans-Nerolidol": 🧴 <strong>Trans-Nerolidol</strong><br><br>• Smells like: Floral, apple, tea-tree oil<br>• Feels like: Sedating, chill<br>• Helps with: Skin healing, antibacterial,
      "Bisabolol": 🌼 <strong>Bisabolol</strong><br><br>• Smells like: Sweet, floral (like chamomile)<br>• Feels like: Calm, soothing<br>• Helps with: Inflammation, skin repair, anxiety<br>• Fun fact: Main ingredient in chamomile’s relaxing effect
    };

  const previewBackdrop = document.getElementById("previewBackdrop");
const previewImg = document.getElementById("previewImg");
const previewTitle = document.getElementById("previewTitle");
const previewPrice = document.getElementById("previewPrice");
const previewLink = document.getElementById("previewLink");
const previewTerps = document.getElementById("previewTerps");

/* OPEN PREVIEW */
function openPreview(product) {
  previewImg.src = product.image || "";
  previewTitle.textContent = product.name || "Product";

  previewPrice.textContent = product.price || "—";

  previewLink.innerHTML = product.link
    ? <a href="${product.link}" target="_blank">View in Store</a>
    : "";

  /* build terp list */
  previewTerps.innerHTML = "";

  if (product.terpenes && product.terpenes.length) {
    product.terpenes.forEach(t => {
      const row = document.createElement("div");
      row.className = "terp-row";

      row.innerHTML = 
        <span>${t.name}</span>
        <span>${typeof t.value === "number" ? t.value.toFixed(2) : t.value}</span>
      ;

      previewTerps.appendChild(row);
    });
  } else {
    previewTerps.innerHTML = "<div style='color:#9aa7b2'>No terpene data</div>";
  }

  previewBackdrop.classList.add("active");
}

/* CLOSE */
function closePreview() {
  previewBackdrop.classList.remove("active");
}

/* click outside closes */
previewBackdrop.addEventListener("click", (e) => {
  if (e.target === previewBackdrop) closePreview();
});
</script>

  background: linear-gradient(180deg, var(--panel2), var(--panel));
  color: var(--text);
  font-weight: 600;
  padding: 12px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 2;
  cursor: pointer;
}

/* CELLS */
td {
  padding: 10px;
  border-bottom: 1px solid var(--border);
  text-align: center;
  word-wrap: break-word;
}

/* ROW HOVER */
tr:hover td{
  background: rgba(70,214,106,0.06);
}

/* STRIPING */
tr:nth-child(even) td {
  background: rgba(255,255,255,0.02);
}

/* LINKS */
a.product-link {
  color: var(--blue);
  text-decoration: none;
  font-weight: 500;
}

a.product-link:hover {
  text-decoration: underline;
}

/* PRODUCT IMAGE (BIG UPGRADE) */
img.product-img {
  max-width: 110px;
  max-height: 110px;
  object-fit: contain;
  border-radius: 10px;
  background: #0f141c;
  padding: 6px;
  transition: transform 0.2s ease;
  cursor: pointer;
}

img.product-img:hover{
  transform: scale(1.08);
}

/* INFO ICON */
.info-icon {
  font-size: 1.1em;
  cursor: pointer;
  opacity: 0.8;
}

.info-icon:hover{
  opacity:1;
}

/* OVERLAY (TERP INFO MODAL) */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
  padding: 14px;
  backdrop-filter: blur(6px);
}

.overlay-content {
  background: var(--panel);
  padding: 22px;
  border-radius: 16px;
  max-width: 600px;
  max-height: 80%;
  overflow-y: auto;
  border: 1px solid var(--border);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  font-size: 0.95rem;
  line-height: 1.5;
}

/* HIGHLIGHTS */
td.highlight-row { background-color: rgba(70,214,106,0.12) !important; }
td.highlight-col { background-color: rgba(59,130,246,0.10) !important; }
td.highlight-cell { background-color: rgba(255,255,255,0.05) !important; }

/* MOBILE */
@media (max-width: 768px) {
  table {
    font-size: 0.75rem;
  }

  img.product-img {
    max-width: 70px;
    max-height: 70px;
  }

  h1 {
    font-size: 1.2rem;
  }
}

@media (max-width: 480px) {
  h1 {
    font-size: 1rem;
  }

  #subcategoryFilter {
    font-size: 0.85rem;
  }
}

    .preview-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 20px;
}

.preview-backdrop.active {
  display: flex;
}

.preview-modal {
  width: min(900px, 95vw);
  max-height: 85vh;
  overflow: hidden;
  background: #161b22;
  border: 1px solid #2a313d;
  border-radius: 18px;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
}

.preview-image {
  background: #0f141c;
  display:flex;
  align-items:center;
  justify-content:center;
  padding: 16px;
}

.preview-image img {
  max-width: 100%;
  max-height: 70vh;
  object-fit: contain;
}

.preview-info {
  padding: 16px;
  overflow: hidden;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.preview-title { font-weight:700; font-size:16px; }
.preview-price { color:#46d66a; font-weight:700; }

.preview-link a {
  color:#3b82f6;
  text-decoration:none;
}

.terp-scroll {
  margin-top:10px;
  overflow-y:auto;
  background:#0f141c;
  border:1px solid #2a313d;
  border-radius:10px;
  padding:10px;
  flex:1;
}

.terp-row {
  display:flex;
  justify-content:space-between;
  padding:3px 0;
  font-size:13px;
  border-bottom:1px dashed rgba(255,255,255,0.05);
}
</style>

</head>

<body>
  <h1 id="pageTitle">Terpene Data</h1>
  <div id="status">Loading...</div>

  <div id="progressBarContainer"><div id="progressBar"></div></div>


  <div id="filterContainer">
    <label for="subcategoryFilter" style="margin-right: 6px; font-weight: bold;">Filter:</label>
    <select id="subcategoryFilter">
      <option value="all">All Products</option>
      <option value="vapes">Vapes</option>
      <option value="concentrates">Concentrates</option>
      <option value="pre-rolls">Pre-rolls</option>
      <option value="premium-flower">Premium Flower</option>
    </select>
  </div>

  <div id="tableContainer"></div>

  <div id="overlay" class="overlay" onclick="if(event.target.id==='overlay'){ this.style.display='none'; }">
    <div id="overlayContent" class="overlay-content"></div>
  </div>
<div id="previewBackdrop" class="preview-backdrop">
  <div class="preview-modal" id="previewModal">

    <div class="preview-image">
      <img id="previewImg" src="" />
    </div>

    <div class="preview-info">
      <div class="preview-title" id="previewTitle"></div>

      <div class="preview-price" id="previewPrice"></div>

      <div class="preview-link" id="previewLink"></div>

      <div class="terp-scroll" id="previewTerps"></div>
    </div>

  </div>
</div>
<script>
let productMap = new Map();

const progressBar = document.getElementById("progressBar");
function updateProgress(percent) { progressBar.style.width = percent + "%"; }
updateProgress(5);

const params = new URLSearchParams(window.location.search);
const retailer = params.get("retailer") || "tampa";
const displayName = retailer.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
document.getElementById("pageTitle").textContent = Terpenes — ${displayName};

let allFetchedProducts = [];

/* =========================
   DATA LOAD
========================= */
Promise.all([
  fetch(https://cookiesflorida.co/wp-json/dovetail-api/v1/products?page=1&perpage=100&orderby=popular&order=desc&retailer=${retailer}&menutype=medical&categories[]=vapes).then(r => r.text()),
  fetch(https://cookiesflorida.co/wp-json/dovetail-api/v1/products?page=1&perpage=100&orderby=popular&order=desc&retailer=${retailer}&menutype=medical&categories[]=concentrates).then(r => r.text()),
  fetch(https://cookiesflorida.co/wp-json/dovetail-api/v1/products?page=1&perpage=100&orderby=popular&order=desc&retailer=${retailer}&menutype=medical&categories[]=pre-rolls).then(r => r.text()),
  fetch(https://cookiesflorida.co/wp-json/dovetail-api/v1/products?page=1&perpage=100&orderby=popular&order=desc&retailer=${retailer}&menutype=medical&categories[]=premium-flower).then(r => r.text())
]).then(([vapeData, concData, prerollData, flowerData]) => {

  updateProgress(40);

  const vapeProducts = fixMalformedJson(vapeData).flatMap(p => p.results ?? []);
  vapeProducts.forEach(p => p._sourceCategory = "vapes");

  const concProducts = fixMalformedJson(concData).flatMap(p => p.results ?? []);
  concProducts.forEach(p => p._sourceCategory = "concentrates");

  const prerollProducts = fixMalformedJson(prerollData).flatMap(p => p.results ?? []);
  prerollProducts.forEach(p => p._sourceCategory = "pre-rolls");

  const flowerProducts = fixMalformedJson(flowerData).flatMap(p => p.results ?? []);
  flowerProducts.forEach(p => p._sourceCategory = "premium-flower");

  allFetchedProducts = [...vapeProducts, ...concProducts, ...prerollProducts, ...flowerProducts];

  updateProgress(80);
  renderTerpeneTable(allFetchedProducts);
  updateProgress(100);

}).catch(err => {
  document.getElementById("status").innerHTML =
    <p class="error">Failed to load data for <strong>${displayName}</strong>.</p>;
  console.error(err);
});

/* =========================
   JSON FIX
========================= */
function fixMalformedJson(raw) {
  const trimmed = raw.trim();
  const needsStart = !trimmed.startsWith("[");
  const needsEnd = !trimmed.endsWith("]");
  return JSON.parse(${needsStart ? "[" : ""}${trimmed}${needsEnd ? "]" : ""});
}

/* =========================
   FILTER
========================= */
document.getElementById("subcategoryFilter").addEventListener("change", function () {
  const selected = this.value;
  if (selected === "all") {
    renderTerpeneTable(allFetchedProducts);
  } else {
    renderTerpeneTable(allFetchedProducts.filter(p => p._sourceCategory === selected));
  }
});

/* =========================
   PREVIEW MODAL (TOAST)
========================= */
const previewBackdrop = document.getElementById("previewBackdrop");
const previewImg = document.getElementById("previewImg");
const previewTitle = document.getElementById("previewTitle");
const previewPrice = document.getElementById("previewPrice");
const previewLink = document.getElementById("previewLink");
const previewTerps = document.getElementById("previewTerps");

function openPreview(product) {
  previewImg.src = product.image || "";
  previewTitle.textContent = product.name || "Product";

  previewPrice.textContent = product.price || "—";

  previewLink.innerHTML = product.link
    ? <a href="${product.link}" target="_blank">View in Store</a>
    : "";

  previewTerps.innerHTML = "";

  (product.terpenes || []).forEach(t => {
    const row = document.createElement("div");
    row.className = "terp-row";
    row.innerHTML = <span>${t.name}</span><span>${t.value ?? ""}</span>;
    previewTerps.appendChild(row);
  });

  previewBackdrop.classList.add("active");
}

function closePreview() {
  previewBackdrop.classList.remove("active");
}

previewBackdrop.addEventListener("click", (e) => {
  if (e.target === previewBackdrop) closePreview();
});

/* =========================
   TABLE RENDER
========================= */
function renderTerpeneTable(products) {

  // ✅ BUILD MAP ONCE (FIXED)
  productMap.clear();
  products.forEach(p => {
    const img = p.images?.[0]?.url;
    if (img) productMap.set(img, p);
  });

  const excludedTerpenes = ["Guaiol", "Eucalyptol", "Isopulegol", "Nerolidol", "Terpinene"];

  const allTerpenes = [...new Set(
    products.flatMap(p => (p.terpenes ?? [])
      .map(t => t.name)
      .filter(name => name && !excludedTerpenes.includes(name))
    )
  )].sort();

  const columns = ["Image", "Price", "ProductName", "Delivery", ...allTerpenes];

  const rows = products.map(p => {

    const terpMap = Object.fromEntries(
      (p.terpenes ?? []).map(t => [
        t.name,
        typeof t.value === "number" ? t.value.toFixed(2) : ""
      ])
    );

    let priceValue = "—";
    if (Array.isArray(p.variants) && p.variants.length > 0) {
      const v = p.variants[0];
      const price = v.price ?? v.regular_price;
      if (price !== undefined && price !== null) {
        priceValue = $${parseFloat(price).toFixed(2)};
      }
    }

    return {
      Image: p.images?.[0]?.url || "",
      Price: priceValue,
      ProductName: <a class="product-link" href="${p.permalink || p.link || "#"}" target="_blank">${p.name}</a>,
      Delivery: p.subcategory || "",
      ...Object.fromEntries(allTerpenes.map(t => [t, terpMap[t] ?? ""]))
    };
  });

  createSortableTable(columns, rows);
  document.getElementById("status").textContent = Loaded ${rows.length} products.;
}

/* =========================
   TABLE BUILDER
========================= */
function createSortableTable(columns, data) {
  const table = document.createElement("table");
  const thead = table.createTHead();
  const headRow = thead.insertRow();

  columns.forEach(col => {
    const th = document.createElement("th");

    th.textContent = col;
    th.addEventListener("click", () => sortBy(col, data));

    headRow.appendChild(th);
  });

  const tbody = table.createTBody();

  data.forEach((row) => {
    const tr = tbody.insertRow();

    columns.forEach((col) => {
      const td = tr.insertCell();

      /* =========================
         IMAGE + HOVER PREVIEW FIX
      ========================= */
      if (col === "Image" && row[col]) {

        const imgUrl = row[col];

        td.innerHTML = <img class="product-img" src="${imgUrl}" />;

        const product = productMap.get(imgUrl);
        const imgEl = td.querySelector("img");

        if (product) {
          imgEl.addEventListener("mouseenter", () => {

            const price = product.variants?.length
              ? $${parseFloat(product.variants[0].price ?? product.variants[0].regular_price ?? 0).toFixed(2)}
              : "—";

            openPreview({
              image: imgUrl,
              name: product.name,
              price,
              link: product.permalink || product.link,
              terpenes: (product.terpenes || []).map(t => ({
                name: t.name,
                value: t.value
              }))
            });

          });

          imgEl.addEventListener("mouseleave", closePreview);
        }

      } else {
        td.innerHTML = row[col] || "";
      }
    });
  });

  const container = document.getElementById("tableContainer");
  container.innerHTML = "";
  container.appendChild(table);
}

/* =========================
   SORT
========================= */
function sortBy(col, data) {
  const isNumeric = data.every(r => !isNaN(parseFloat(r[col])) || r[col] === "");

  const sorted = [...data].sort((a, b) => {
    const av = isNumeric ? parseFloat(a[col]) || 0 : (a[col] || "").toLowerCase();
    const bv = isNumeric ? parseFloat(b[col]) || 0 : (b[col] || "").toLowerCase();
    return isNumeric ? bv - av : av.localeCompare(bv);
  });

  createSortableTable(Object.keys(sorted[0]), sorted);
}

</script>
