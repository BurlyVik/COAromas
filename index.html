<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Brand</title>
  <style>
    :root{
  --bg:#0e1116;
  --panel:#161b22;
  --panel2:#1c222d;
  --text:#e6edf3;
  --muted:#9aa7b2;
  --accent:#46d66a;
  --border:#2a313d;
  --blue:#3b82f6;
}

*{
  box-sizing:border-box;
}

body {
  font-family: Inter, system-ui, sans-serif;
  background: var(--bg);
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: var(--text);
}

/* TITLE */
h1 {
  font-size: 1.8rem;
  margin-bottom: 40px;
  text-align: center;
  font-weight: 700;
  letter-spacing: 0.3px;
}

/* LOGO WRAPPER */
.logo-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

/* LOGO TILE (dark UI card style) */
.logo-tile {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 250px;
  height: 250px;

  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;

  padding: 18px;
  text-decoration: none;

  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  position: relative;
  overflow: hidden;
}

/* subtle glow accent */
.logo-tile::before {
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(circle at top left, rgba(70,214,106,0.08), transparent 60%);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.logo-tile:hover {
  transform: scale(1.05);
  box-shadow: 0 15px 45px rgba(0,0,0,0.55);
  border-color: rgba(70,214,106,0.35);
}

.logo-tile:hover::before {
  opacity: 1;
}

/* LOGO IMAGE */
.logo-tile img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4));
}

/* DIVIDER (modernized) */
.divider {
  width: 2px;
  height: 250px;
  background: linear-gradient(
    to bottom,
    transparent,
    rgba(154,167,178,0.3),
    transparent
  );
}

/* DISCLAIMER */
.disclaimer {
  margin-top: 40px;
  font-size: 0.8rem;
  color: var(--muted);
  text-align: center;
  max-width: 520px;
  line-height: 1.5;
}

/* MOBILE */
@media (max-width: 700px) {
  .logo-container {
    flex-direction: column;
  }

  .divider {
    display: none;
  }

  .logo-tile {
    width: 220px;
    height: 220px;
  }

  h1 {
    font-size: 1.4rem;
  }
}
  </style>
</head>

<body>
  <h1>Select Your Brand</h1>

  <div class="logo-container">
    <a class="logo-tile" href="cookies.html">
      <img src="https://github.com/BurlyVik/COAromas/blob/main/ct.png?raw=true" alt="Cookies Florida">
    </a>

    <div class="divider"></div>

    <a class="logo-tile" href="jungle.html">
      <img src="https://github.com/BurlyVik/COAromas/blob/main/jt.png?raw=true" alt="Jungle Boys Florida">
    </a>
  </div>

  <div class="disclaimer">
    The logos displayed above are the property of their respective owners.  
    I did not create these logos — they were designed by the owners of the official sites.
  </div>
</body>

</html>
